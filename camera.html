<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karteek Gandiboyina | Photography</title>
  <link rel="icon" type="image/png" href="teasers/icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #05080f;
      --surface: #0c1018;
      --border:  #1a2030;
      --text:    #c8d0dc;
      --muted:   #4a5568;
      --accent:  #f59e0b;
      --white:   #f1f5f9;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.2rem, 5vw, 3rem);
      height: 58px;
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      text-decoration: none;
    }

    .nav-brand span { color: var(--accent); }

    .nav-links { display: flex; align-items: center; gap: 0.5rem; }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a:hover { background: var(--border); color: var(--white); }

    /* ── HERO ─────────────────────────────── */
    .hero {
      padding-top: 58px;
      height: 38vh;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(5,8,15,0.15) 0%,
          rgba(5,8,15,0.5)  50%,
          rgba(5,8,15,1)    100%),
        url('https://res.cloudinary.com/dryycqb6z/image/upload/q_auto,f_auto,w_1400/v1775091767/1_bz4seb.jpg')
        center /cover no-repeat;
      z-index: 0;
    }

    .hero-content { position: relative; z-index: 1; padding: 0 1rem; }

    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }

    .hero-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      max-width: 420px;
    }

    .photo-count {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ── GALLERY ──────────────────────────── */
    .gallery-section {
      padding: 2.5rem clamp(0.75rem, 4vw, 2.5rem) 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .masonry {
      columns: 4 240px;
      column-gap: 8px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      background: var(--border);
    }

    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.4s ease, filter 0.5s ease, opacity 0.5s ease;
      filter: brightness(0.45) saturate(0.6);
      opacity: 0.82;
    }

    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.05) saturate(1);
      opacity: 1;
    }

    /* Mobile: always full color, no hover effect */
    @media (hover: none) {
      .masonry-item img {
        filter: brightness(0.95) saturate(1);
        opacity: 1;
      }
    }

    .masonry-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .masonry-item:hover .overlay { background: rgba(0,0,0,0.22); }

    .masonry-item .overlay i {
      color: white;
      font-size: 1.3rem;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s;
    }

    .masonry-item:hover .overlay i { opacity: 1; transform: scale(1); }

    /* ── LIGHTBOX ─────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.97);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .lightbox.open { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lightbox-img-wrap {
      max-width: 92vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img-wrap img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      transition: opacity 0.15s;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      z-index: 1010;
      -webkit-tap-highlight-color: transparent;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.18); }
    .lb-prev { left: clamp(8px, 2vw, 24px); }
    .lb-next { right: clamp(8px, 2vw, 24px); }

    .lb-close {
      position: fixed;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      z-index: 1010;
      transition: background 0.2s;
    }

    .lb-close:hover { background: rgba(255,255,255,0.2); }

    .lb-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      z-index: 1010;
    }

    /* ── FOOTER ──────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { color: #fcd34d; }

    /* ── MOBILE ───────────────────────────── */
    @media (max-width: 600px) {
      .masonry { columns: 2 140px; column-gap: 5px; }
      .masonry-item { margin-bottom: 5px; }
      .lb-btn { width: 38px; height: 38px; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-brand">KG <span>·</span> Photography</a>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Portfolio</a>
      <a href="mailto:gkarteek99@gmail.com"><i class="fas fa-envelope"></i></a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Part-time engineer &nbsp;·&nbsp; full-time observer</p>
      <h1 class="hero-title">Through the Lens</h1>
      <p class="hero-sub">Moments captured between robotics experiments — travel, nature, and street.</p>
      <div class="photo-count"><i class="fas fa-images"></i> 59 photographs</div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery-section">
    <div class="masonry" id="gallery"></div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="handleLbClick(event)">
    <button class="lb-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    <button class="lb-btn lb-prev" onclick="event.stopPropagation(); shiftLightbox(-1)"><i class="fas fa-chevron-left"></i></button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="Full photo" />
    </div>
    <button class="lb-btn lb-next" onclick="event.stopPropagation(); shiftLightbox(1)"><i class="fas fa-chevron-right"></i></button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Karteek Gandiboyina &nbsp;·&nbsp;
      <a href="index.html">Portfolio</a> &nbsp;·&nbsp;
      <a href="mailto:gkarteek99@gmail.com">gkarteek99@gmail.com</a>
    </p>
  </footer>

  <script>
    const BASE   = 'https://res.cloudinary.com/dryycqb6z/image/upload/';
    const THUMB  = 'q_auto,f_auto,w_800/';
    const FULL   = 'q_auto,f_auto/';

    // All 59 Cloudinary paths (version + public_id)
    const photos = [
      'v1775091808/DSC08116_x12wmo.jpg',
      'v1775091807/DSC08037_cbhixx.jpg',
      'v1775091806/DSC07638_jqwrwv.jpg',
      'v1775091806/DSC07691_ucqcmc.jpg',
      'v1775091805/DSC07626_kx67af.jpg',
      'v1775091804/DSC07457_dpozc3.jpg',
      'v1775091803/DSC07404_d3p9tk.jpg',
      'v1775091802/DSC06410-Enhanced-NR_wdcsyw.jpg',
      'v1775091802/DSC05844-Enhanced-NR-2_Copy_yiomzd.jpg',
      'v1775091800/13_uwwspw.jpg',
      'v1775091801/DSC05756-Enhanced-NR_qfzxcj.jpg',
      'v1775091799/12_r8qjy5.jpg',
      'v1775091799/11_nlom5h.jpg',
      'v1775091798/10_sczfhk.jpg',
      'v1775091798/9_vmj0vj.jpg',
      'v1775091798/7_purwcx.jpg',
      'v1775091797/5_ftqhsj.jpg',
      'v1775091796/8_knfgoj.jpg',
      'v1775091795/6_r7qwn1.jpg',
      'v1775091794/3_kp0koy.jpg',
      'v1775091794/4_aw7edw.jpg',
      'v1775091793/2_rhuzt2.jpg',
      'v1775091790/1_bz4seb.jpg',
      'v1775091787/_DSC9185-Enhanced-NR_pzwirk.jpg',
      'v1775091786/_DSC8917-Enhanced-NR_ktp9kv.jpg',
      'v1775091786/_DSC8302-Enhanced-NR-2_ejyfvk.jpg',
      'v1775091785/_DSC8215-Enhanced-NR-2_wdo0uh.jpg',
      'v1775091784/_DSC8169-Enhanced-NR-2_r4ygfl.jpg',
      'v1775091784/_DSC7598-Enhanced-NR_rjzush.jpg',
      'v1775091784/_DSC8047-Enhanced-NR_i5twha.jpg',
      'v1775091784/_DSC8273-Enhanced-NR_iz4ecd.jpg',
      'v1775091783/_DSC7920-Enhanced-NR_o6oigc.jpg',
      'v1775091780/_DSC8023-Enhanced-NR_bqv0fh.jpg',
      'v1775091780/_DSC7470-Enhanced-NR-2_okubst.jpg',
      'v1775091778/_DSC7468-Enhanced-NR_zvscff.jpg',
      'v1775091778/_DSC7404-Enhanced-NR_jffem3.jpg',
      'v1775091778/_DSC7262-Enhanced-NR_ahhsun.jpg',
      'v1775091778/_DSC5877-Enhanced-NR_bcdcb2.jpg',
      'v1775091778/_DSC5568-Enhanced-NR_v7hraw.jpg',
      'v1775091777/_DSC7347-Enhanced-NR_zxobtl.jpg',
      'v1775091775/_DSC5945-Enhanced-NR_pppg2t.jpg',
      'v1775091773/_DSC4593-Enhanced-NR_gaedb1.jpg',
      'v1775091773/_DSC4208-Enhanced-NR_mwitpw.jpg',
      'v1775091772/_DSC5361-Enhanced-NR_pgt8dh.jpg',
      'v1775091772/_DSC5400-Enhanced-NR_m9qmo1.jpg',
      'v1775091771/_DSC4318-Enhanced-NR_aqwklu.jpg',
      'v1775091769/_DSC3912-Enhanced-NR_lj7tzz.jpg',
      'v1775091767/_DSC2321-Enhanced-NR_kkf8ng.jpg',
      'v1775091768/_DSC3859-Enhanced-NR_oa2ls0.jpg',
      'v1775091768/_DSC2384-Enhanced-NR_fwhn9x.jpg',
      'v1775091768/_DSC2121-Enhanced-NR_uhwhv4.jpg',
      'v1775091767/_DSC2262-Enhanced-NR_q2m978.jpg',
      'v1775091767/_DSC2090-Enhanced-NR-2_pferoa.jpg',
      'v1775091762/_DSC1816-Enhanced-NR_c1e0fg.jpg',
      'v1775091762/_DSC1632-Enhanced-NR_vdjsco.jpg',
      'v1775091760/_DSC1223-Enhanced-NR_hdeaeu.jpg',
      'v1775091759/_DSC1220-Enhanced-NR_voujk9.jpg',
      'v1775091758/_DSC0510-Enhanced-NR-2_yxfwj6.jpg',
      'v1775091758/_DSC0413-Enhanced-NR_yvykwg.jpg',
    ];

    // Shuffle (Fisher-Yates)
    for (let i = photos.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [photos[i], photos[j]] = [photos[j], photos[i]];
    }

    // Build masonry grid
    const gallery = document.getElementById('gallery');
    photos.forEach((path, i) => {
      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.onclick = () => openLightbox(i);
      item.innerHTML = `
        <img src="${BASE}${THUMB}${path}" alt="Photo ${i+1}" loading="lazy" />
        <div class="overlay"><i class="fas fa-expand"></i></div>
      `;
      gallery.appendChild(item);
    });

    // Lightbox
    let cur = 0;

    function openLightbox(idx) {
      cur = idx;
      document.getElementById('lb-img').src = BASE + FULL + photos[cur];
      document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + photos.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function shiftLightbox(dir) {
      cur = (cur + dir + photos.length) % photos.length;
      const img = document.getElementById('lb-img');
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = BASE + FULL + photos[cur];
        img.style.opacity = '1';
        document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + photos.length;
      }, 150);
    }

    function handleLbClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowRight') shiftLightbox(1);
      if (e.key === 'ArrowLeft')  shiftLightbox(-1);
    });

    // Touch swipe
    let touchStartX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) shiftLightbox(dx < 0 ? 1 : -1);
    });
  </script>

</body>
</html>
