  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #05080f;
      --surface:   #0c1018;
      --border:    #1a2030;
      --text:      #c8d0dc;
      --muted:     #4a5568;
      --accent:    #f59e0b;
      --white:     #f1f5f9;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.2rem, 5vw, 3rem);
      height: 58px;
      background: rgba(5, 8, 15, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .nav-brand span { color: var(--accent); }

    .nav-links { display: flex; align-items: center; gap: 0.5rem; }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover { background: var(--border); color: var(--white); }

    .nav-links a.active {
      background: rgba(245,158,11,0.15);
      color: var(--accent);
    }

    .nav-links a.back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── HERO ─────────────────────────────── */
    .hero {
      padding-top: 58px;
      height: 38vh;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(5,8,15,0.2) 0%, rgba(5,8,15,0.85) 100%),
                  url('camera/_DSC2262-Enhanced-NR.jpg') center/cover no-repeat;
      filter: brightness(0.45);
      z-index: 0;
    }

    .hero-content { position: relative; z-index: 1; padding: 0 1rem; }

    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }

    .hero-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      max-width: 420px;
    }

    .photo-count {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ── GALLERY ──────────────────────────── */
    .gallery-section {
      padding: 3rem clamp(0.75rem, 4vw, 2.5rem) 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Masonry via CSS columns */
    .masonry {
      columns: 4 240px;
      column-gap: 10px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      background: var(--border);
    }

    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.4s ease, filter 0.3s ease;
      filter: brightness(0.92);
    }

    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.05);
    }

    .masonry-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .masonry-item:hover .overlay {
      background: rgba(0,0,0,0.25);
    }

    .masonry-item .overlay i {
      color: white;
      font-size: 1.4rem;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s;
    }

    .masonry-item:hover .overlay i {
      opacity: 1;
      transform: scale(1);
    }

    /* ── LIGHTBOX ─────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .lightbox.open { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lightbox-img-wrap {
      position: relative;
      max-width: 92vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img-wrap img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      transition: opacity 0.2s;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      z-index: 1010;
      -webkit-tap-highlight-color: transparent;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.18); }
    .lb-prev { left: clamp(8px, 2vw, 24px); }
    .lb-next { right: clamp(8px, 2vw, 24px); }

    .lb-close {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      z-index: 1010;
      transition: background 0.2s;
    }

    .lb-close:hover { background: rgba(255,255,255,0.2); }

    .lb-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      z-index: 1010;
    }

    /* ── FOOTER ──────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { color: #fcd34d; }

    /* ── MOBILE ───────────────────────────── */
    @media (max-width: 600px) {
      .masonry { columns: 2 140px; column-gap: 6px; }
      .masonry-item { margin-bottom: 6px; }
      .lb-btn { width: 38px; height: 38px; }
    }

  <div class="lightbox" id="lightbox" onclick="handleLbClick(event)">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close"><i class="fas fa-times"></i></button>
    <button class="lb-btn lb-prev" onclick="event.stopPropagation(); shiftLightbox(-1)" aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="Full photo" />
    </div>
    <button class="lb-btn lb-next" onclick="event.stopPropagation(); shiftLightbox(1)" aria-label="Next"><i class="fas fa-chevron-right"></i></button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Karteek Gandiboyina &nbsp;·&nbsp;
      <a href="index.html">Portfolio</a> &nbsp;·&nbsp;
      <a href="mailto:gkarteek99@gmail.com">gkarteek99@gmail.com</a>
    </p>
  </footer>

  <script>
    // Collect all image srcs from gallery items
    const items = document.querySelectorAll('.masonry-item img');
    const srcs  = Array.from(items).map(img => img.src);
    let   cur   = 0;

    function openLightbox(idx) {
      cur = idx;
      document.getElementById('lb-img').src = srcs[cur];
      document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + srcs.length;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function shiftLightbox(dir) {
      cur = (cur + dir + srcs.length) % srcs.length;
      const img = document.getElementById('lb-img');
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = srcs[cur];
        img.style.opacity = '1';
        document.getElementById('lb-counter').textContent = (cur + 1) + ' / ' + srcs.length;
      }, 150);
    }

    function handleLbClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowRight')  shiftLightbox(1);
      if (e.key === 'ArrowLeft')   shiftLightbox(-1);
    });

    // Touch swipe support
    let touchStartX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) shiftLightbox(dx < 0 ? 1 : -1);
    });
  </script>

</body>
